# This repository is generated by the Axemere release pipeline; it does not accept
# contributions. GitHub does not allow disabling forking on a public repo, so a fork
# can still open a PR (it can never be merged — that needs write access). This
# workflow auto-closes any such PR with a pointer to support.
#
# `pull_request_target` (not `pull_request`) is required: a `pull_request` run from a
# fork gets a read-only token and cannot comment or close. This workflow never checks
# out or runs PR code, so `pull_request_target` is safe here.
name: Close external PRs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Thanks for your interest! 🙏",
              "",
              "This repository is **generated automatically** by the Axemere release",
              "pipeline, so pull requests can't be accepted here — any change would be",
              "overwritten on the next release.",
              "",
              "Found a bug or have a request? Please reach out via https://axemere.ai/docs.",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed",
            });
